<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Basketball Scoreboard</title>
    <link rel="stylesheet" href="styles/reset.css" />
    <link rel="stylesheet" href="styles/style.css" />
  </head>
  <body>
    <div class="page">
      <header>
        <img src="assets/images/basketball.png" alt="Orange Basketball" />
        <h1>Scoreboard</h1>
      </header>
      <main>
        <section id="home">
          <h2>Home</h2>
          <div class="score" id="home-score">0</div>
          <div class="score-btns">
            <button disabled class="score-btn" id="home-1">+1</button>
            <button disabled class="score-btn" id="home-2">+2</button>
            <button disabled class="score-btn" id="home-3">+3</button>
          </div>

          <h3>Fouls</h3>
          <div class="fouls" id="home-fouls">0</div>
          <button disabled class="add-foul" id="home-foul">+ Foul</button>
        </section>
        <section>
          <div class="time">
            <span class="time-span" id="minutes">00</span>
            <span>:</span>
            <span class="time-span" id="seconds">00</span>
          </div>
          <div class="period" id="period">0</div>
          <div class="game-btns">
            <button disabled class="game-btn" id="new-period">+ Period</button>
            <button class="game-btn" id="new-game">Start Game</button>
          </div>
        </section>
        <section id="guest">
          <h2>Guest</h2>
          <div class="score" id="guest-score">0</div>
          <div class="score-btns">
            <button disabled class="score-btn" id="guest-1">+1</button>
            <button disabled class="score-btn" id="guest-2">+2</button>
            <button disabled class="score-btn" id="guest-3">+3</button>
          </div>

          <h3>Fouls</h3>
          <div class="fouls" id="guest-fouls">0</div>
          <button disabled class="add-foul" id="guest-foul">+ Foul</button>
        </section>
      </main>
    </div>
    <script src="scripts/script.js"></script>
  </body>
</html>
